<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kim Petras</title>
  <meta name="description" content="let's take a detour"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
      color: #000;
    }

    /* ─────────── WALLPAPER GRID ─────────── */
    .grid-wallpaper {
      position: fixed;
      left: 0;
      top: 48px;
      z-index: 0;
      width: 100dvw;
      height: calc(100dvh - 48px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      grid-template-rows: repeat(6, minmax(0,1fr));
      overflow: hidden;
      pointer-events: none;
    }
    .grid-wallpaper > div {
      position: relative;
      overflow: hidden;
      background: #e5e5e5;
    }
    .grid-wallpaper img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ─────────── HEADER ─────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 30;
      width: 100%;
      background: #fff;
      padding: 8px 16px;
    }
    .header-inner {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto minmax(0,1fr);
      align-items: baseline;
      gap: 16px;
      padding: 8px 16px;
    }
    .logo svg { height: 14px; width: auto; display: block; }
    .logo a { text-decoration: none; display: block; }
    .logo a:hover { opacity: 0.8; }

    .primary-nav {
      display: flex;
      flex-nowrap: nowrap;
      gap: 16px;
      justify-content: center;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .primary-nav::-webkit-scrollbar { display: none; }

    .nav-btn, .nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 300;
      text-transform: lowercase;
      color: #000;
      opacity: 0.75;
      padding: 0;
      white-space: nowrap;
      font-family: inherit;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .nav-btn:hover, .nav-link:hover {
      opacity: 0.8;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .header-right {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 8px;
    }
    .bag-btn {
      position: relative;
      padding: 4px;
    }
    .bag-count {
      margin-left: 24px;
      font-variant-numeric: tabular-nums;
    }

    /* ─────────── MAIN ─────────── */
    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .main-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 768px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 128px 64px 160px;
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ─────────── AUDIO PLAYER ─────────── */
    #player {
      position: fixed;
      z-index: 45;
      display: flex;
      flex-direction: column;
      width: 320px;             /* w-80 */
      border-radius: 16px;      /* rounded-2xl */
      background: rgba(255,255,255,0.34);
      backdrop-filter: blur(9.2px);
      -webkit-backdrop-filter: blur(9.2px);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      left: 16px;
      top: 16px;
    }

    /* Top row */
    .player-top {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 16px 16px 0 0;
      padding: 12px;
    }

    .drag-area {
      display: flex;
      min-width: 0;
      flex: 1;
      cursor: grab;
      align-items: center;
      gap: 12px;
      touch-action: none;
      user-select: none;
    }
    .drag-area:active { cursor: grabbing; }

    .album-art {
      display: flex;
      height: 48px;
      width: 48px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(0,0,0,0.1);
    }
    .album-art img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .emoji-fallback { font-size: 24px; display: none; }

    .track-text { min-width: 0; flex: 1; }
    .track-name {
      display: block;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 14px; font-weight: 500; color: #000;
    }
    .track-sub {
      display: block;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 12px; color: #4b5563;
    }

    .player-controls {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }

    /* Prev / Next */
    .btn-skip {
      border-radius: 4px;
      padding: 8px;
      background: linear-gradient(to bottom, #e5e7eb, #9ca3af);
      border: 1px solid rgba(156,163,175,0.6);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
      color: #374151;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-skip:hover { background: linear-gradient(to bottom, #d1d5db, #6b7280); }
    .btn-skip:active { background: #9ca3af; }

    /* Play */
    .btn-play {
      border-radius: 9999px;
      padding: 12px;
      background: linear-gradient(to bottom, #e5e7eb, #6b7280);
      border: 1px solid rgba(156,163,175,0.7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
      color: #1f2937;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-play:hover { background: linear-gradient(to bottom, #d1d5db, #4b5563); }
    .btn-play:active { background: linear-gradient(to bottom, #9ca3af, #374151); }

    /* Volume row */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.55);
      padding: 8px 12px 12px;
    }
    .vol-icon { color: #6b7280; flex-shrink: 0; }

    input[type=range] {
      flex: 1;
      height: 6px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 9999px;
      background: rgba(0,0,0,0.2);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      border: none;
    }

    /* Countdown */
    .countdown-wrap {
      border-top: 1px solid rgba(255,255,255,0.55);
      padding: 8px 12px 12px;
      text-align: center;
    }
    .cd-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .cd-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 4px;
      font-family: 'Dancing Script', cursive;
    }
    .cd-unit { display: flex; flex-direction: column; align-items: center; }
    .cd-num {
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
      color: #000;
      min-width: 40px;
      text-align: center;
    }
    .cd-lbl {
      font-family: system-ui, sans-serif;
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #9ca3af;
      margin-top: 2px;
    }
    .cd-sep {
      font-size: 26px;
      color: #9ca3af;
      margin-top: 0;
      font-family: system-ui;
      animation: sepBlink 1s step-end infinite;
    }
    @keyframes sepBlink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* ─────────── FOOTER ─────────── */
    footer {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      margin-top: auto;
      position: relative;
      z-index: 10;
    }
    .footer-copy {
      text-align: center;
      font-size: 14px;
      font-weight: 300;
      color: rgba(0,0,0,0.8);
    }
    .footer-nav {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-nav a {
      font-size: 14px;
      font-weight: 300;
      text-transform: lowercase;
      color: rgba(0,0,0,0.8);
      text-decoration: none;
    }
    .footer-nav a:hover { opacity: 0.8; }
  </style>
</head>

<!-- ── AUDIO PLAYER (exact replica of Kim's widget) ── -->
<div id="player" role="region" aria-label="Audio player">

  <!-- Row 1: drag area + controls -->

    <div class="drag-area" id="dragHandle" aria-label="Drag to move player">

      <div class="album-art">
        <img

          src="https://cdn.sanity.io/images/0m1p5xal/production/5a8c44a8258b896f2280a3a0051b4838ca71c4c2-1936x1936.jpg"
          alt="Need For Speed"
          onerror="this.style.display='none';document.getElementById('emojiArt').style.display='block'"
        />
        <span id="emojiArt" class="emoji-fallback" aria-hidden="true">🎵</span>
      </div>
      <!-- Track info -->
      <div class="track-text">
        <p class="track-name" id="trackName">Need For Speed</p>
        <p class="track-sub" id="trackSub">Kim Petras</p>
      </div>
    </div>

    <!-- Prev / Play / Next -->
    <div class="player-controls">
      <button type="button" class="btn-skip" aria-label="Previous track">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button type="button" class="btn-play" id="btnPlay" aria-label="Play">
        <svg id="iconPlay" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" style="margin-left:2px">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="iconPause" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button type="button" class="btn-skip" aria-label="Next track">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 18l8.5-6L6 6v12zm2.5-6 4 2.7V9.3L8.5 12zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Row 2: volume -->
  <div class="volume-row">
    <svg class="vol-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1" aria-label="Volume"/>
  </div>

  <!-- Row 3: Countdown -->
  <div class="countdown-wrap">
    <p class="cd-label">May 29, 2026</p>
    <div class="cd-row">
      <div class="cd-unit">
        <span class="cd-num" id="cdD">--</span>
        <span class="cd-lbl">days</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdH">--</span>
        <span class="cd-lbl">hrs</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdM">--</span>
        <span class="cd-lbl">min</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdS">--</span>
        <span class="cd-lbl">sec</span>
      </div>
    </div>
  </div>

</div>

<!-- Hidden YouTube audio (autoplay) -->
<iframe
  id="ytFrame"
  src="https://www.youtube.com/embed/3xwk3Fb_Uis?autoplay=1&loop=1&playlist=3xwk3Fb_Uis&enablejsapi=1&controls=0&mute=0"
  allow="autoplay; encrypted-media"
  style="position:fixed;width:1px;height:1px;top:-9999px;left:-9999px;opacity:0;pointer-events:none;border:none"
  title="Need For Speed – Kim Petras"
></iframe>

</footer>

<script>
  /* ── YouTube IFrame API ── */
  let ytPlayer, playing = false;

  window.onYouTubeIframeAPIReady = function () {
    ytPlayer = new YT.Player('ytFrame', {
      events: {
        onReady(e) {
          e.target.setVolume(parseFloat(document.getElementById('volSlider').value) * 100);
          e.target.playVideo();
        },
        onStateChange(e) {
          if (e.data === YT.PlayerState.PLAYING) setUI(true);
          if (e.data === YT.PlayerState.PAUSED)  setUI(false);
          if (e.data === YT.PlayerState.ENDED)    e.target.playVideo();
        }
      }
    });
  };
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  function setUI(state) {
    playing = state;
    document.getElementById('iconPlay').style.display  = state ? 'none'  : 'block';
    document.getElementById('iconPause').style.display = state ? 'block' : 'none';
  }

  document.getElementById('btnPlay').addEventListener('click', () => {
    if (!ytPlayer) return;
    playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
  });

  document.getElementById('volSlider').addEventListener('input', function () {
    if (ytPlayer) ytPlayer.setVolume(parseFloat(this.value) * 100);
  });

  /* ── Draggable ── */
  const player = document.getElementById('player');
  const handle = document.getElementById('dragHandle');
  let dragging = false, ox = 0, oy = 0;

  handle.addEventListener('pointerdown', e => {
    dragging = true;
    const r = player.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  handle.addEventListener('pointermove', e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(e.clientX - ox, window.innerWidth  - player.offsetWidth));
    const y = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - player.offsetHeight));
    player.style.left = x + 'px';
    player.style.top  = y + 'px';
  });
  ['pointerup','pointercancel'].forEach(ev => handle.addEventListener(ev, () => dragging = false));

  /* ── Countdown to May 29 2026 ── */
  const TARGET = new Date('2026-05-29T00:00:00');
  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2, '0');

  function tick() {
    const diff = TARGET - Date.now();
    if (diff <= 0) { ['cdD','cdH','cdM','cdS'].forEach(id => $(id).textContent = '00'); return; }
    $('cdD').textContent = pad(Math.floor(diff / 86400000));
    $('cdH').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    $('cdM').textContent = pad(Math.floor((diff % 3600000)  / 60000));
    $('cdS').textContent = pad(Math.floor((diff % 60000)    / 1000));
  }
  tick();
  setInterval(tick, 1000);
</script>
