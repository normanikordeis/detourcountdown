<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Petras | DETOUR 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap">
    <style>
        :root {
            --mac-glass: rgba(255, 255, 255, 0.08);
            --mac-border: rgba(255, 255, 255, 0.15);
            --detour-accent: #ff0055; /* Saturated Era Pink */
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2026 Bento Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto auto;
            gap: 20px;
            max-width: 1200px;
            width: 95%;
            padding: 40px;
        }

        .card {
            background: var(--mac-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--mac-border);
            border-radius: 32px; /* Smooth 2026 corners */
            overflow: hidden;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--detour-accent);
        }

        /* Hero Countdown Card */
        .countdown-card {
            grid-column: span 3;
            grid-row: span 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255,0,85,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        .countdown-timer {
            display: flex;
            gap: 30px;
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 20px;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-unit span:first-child {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -3px;
        }

        .time-unit span:last-child {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* Image Cards - Artistically Plastered */
        .img-card { grid-column: span 1; }
        .img-card-tall { grid-row: span 2; }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
        }

        .album-title {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--detour-accent);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        /* Mobile Optimization */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
            .countdown-card { grid-column: span 1; }
            .time-unit span:first-child { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="card countdown-card">
            <p class="album-title">Kim Petras</p>
            <h1>DETOUR</h1>
            <div class="countdown-timer" id="timer">
                <div class="time-unit"><span id="days">00</span><span>Days</span></div>
                <div class="time-unit"><span id="hours">00</span><span>Hrs</span></div>
                <div class="time-unit"><span id="mins">00</span><span>Min</span></div>
                <div class="time-unit"><span id="secs">00</span><span>Sec</span></div>
            </div>
        </div>

        <div class="card img-card">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=600" alt="Kim Petras Detour Era Visual">
        </div>

        <div class="card img-card-tall">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=600" alt="Kim Petras Detour Fashion">
        </div>

        <div class="card img-card">
            <img src="https://images.unsplash.com/photo-1574169208507-84376144848b?auto=format&fit=crop&q=80&w=600" alt="Detour Aesthetic">
        </div>

        <div class="card" style="grid-column: span 2; padding: 30px; display: flex; align-items: center; justify-content: space-between;">
            <div>
                <p style="opacity: 0.5; font-size: 0.8rem;">RELEASE DATE</p>
                <p style="font-weight: 600;">MAY 29, 2026 | 12:00 PM EST</p>
            </div>
            <button style="background: white; color: black; border: none; padding: 12px 24px; border-radius: 100px; font-weight: 600; cursor: pointer;">PRE-SAVE NOW</button>
        </div>
    </div>

    <script>
        // Set target date: May 29, 2026, 12:00:00 PM EST
        // Note: 12 PM EST is UTC-5 (or UTC-4 if Daylight Savings is active)
        const targetDate = new Date("May 29, 2026 12:00:00 EST").getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("timer").innerHTML = "ALBUM OUT NOW";
            }
        };

        const interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
